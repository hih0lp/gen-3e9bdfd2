{% extends "base.html" %}

{% block title %}Вход в админ-панель{% endblock %}

{% block content %}
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-50 to-green-100 py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <i class="fas fa-lock text-5xl text-emerald-600 mb-4"></i>
                <h2 class="text-3xl font-bold text-emerald-800">Вход в админ-панель</h2>
                <p class="text-gray-600 mt-2">Только для администраторов магазина</p>
            </div>
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-emerald-800 font-medium mb-2">Имя пользователя</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 border border-emerald-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all duration-300" placeholder="admin">
                </div>
                <div>
                    <label class="block text-emerald-800 font-medium mb-2">Пароль</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 border border-emerald-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all duration-300" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-emerald-600 to-green-500 hover:from-emerald-700 hover:to-green-600 text-white font-bold py-3 rounded-lg transition-all duration-300 hover:scale-[1.02] shadow-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i>Войти
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-500">
                <p>Данные для входа:</p>
                <p class="font-mono bg-emerald-50 p-2 rounded mt-2">admin / admin123</p>
            </div>
        </div>
    </div>
{% endblock %}
